name: Build Turkey Pack

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (YYYY-MM-DD)'
        required: true
        default: ''
      graphhopper_version:
        description: 'GraphHopper release to use'
        required: true
        default: '9.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PACK_VERSION: ${{ github.event.inputs.version }}
      GH_VERSION: ${{ github.event.inputs.graphhopper_version }}

    steps:
      - name: Compute default version if empty
        run: |
          if [ -z "$PACK_VERSION" ]; then
            PACK_VERSION=$(date -u +'%Y-%m-%d')
            echo "PACK_VERSION=$PACK_VERSION" >> "$GITHUB_ENV"
          fi
          echo "Building turkey-pack-$PACK_VERSION"

      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install osmium-tool + sqlite3
        run: |
          sudo apt-get update
          sudo apt-get install -y osmium-tool sqlite3

      - name: Install Python deps
        run: pip install -r tools/build_turkey_pack/requirements.txt

      - name: Prepare bin/
        run: mkdir -p tools/build_turkey_pack/bin

      - name: Cache Protomaps basemaps JAR
        id: cache-pm
        uses: actions/cache@v4
        with:
          path: tools/build_turkey_pack/bin/protomaps-basemaps.jar
          key: protomaps-basemaps-${{ hashFiles('.github/workflows/build-turkey-pack.yml') }}

      - name: Build Protomaps basemaps JAR
        if: steps.cache-pm.outputs.cache-hit != 'true'
        run: |
          set -e
          git clone --depth 1 https://github.com/protomaps/basemaps /tmp/basemaps
          cd /tmp/basemaps/tiles
          mvn -B -q package -DskipTests
          # Pick the shaded JAR (has dependencies) — its filename includes the
          # project artifactId; glob to stay agnostic of the version suffix.
          JAR=$(ls target/*-with-dependencies.jar 2>/dev/null || ls target/*.jar | grep -v 'original' | head -n 1)
          cp "$JAR" "$GITHUB_WORKSPACE/tools/build_turkey_pack/bin/protomaps-basemaps.jar"

      - name: Download GraphHopper web JAR
        run: |
          set -e
          URL="https://github.com/graphhopper/graphhopper/releases/download/${GH_VERSION}/graphhopper-web-${GH_VERSION}.jar"
          echo "Downloading $URL"
          curl -fL -o "tools/build_turkey_pack/bin/graphhopper-web-${GH_VERSION}.jar" "$URL"

      - name: Run build (with retry on transient download failures)
        env:
          BASE_URL: https://github.com/${{ github.repository }}/releases/download/turkey-pack-${{ env.PACK_VERSION }}
        run: |
          cd tools/build_turkey_pack
          # Point the config at the downloaded GraphHopper JAR so build.py
          # finds it via config.yaml's tools.graphhopper_jar.
          python - <<PY
          import yaml, pathlib
          p = pathlib.Path('config.yaml')
          data = yaml.safe_load(p.read_text())
          data['tools']['graphhopper_jar'] = f"bin/graphhopper-web-${{ env.GH_VERSION }}.jar"
          p.write_text(yaml.safe_dump(data, sort_keys=False))
          PY

          # Retry up to 3 times — OSM CDN and Geofabrik can be flaky.
          # --skip-download + --skip-pmtiles short-circuit the completed
          # stages on subsequent attempts so we don't re-spend 20 minutes
          # on every retry.
          set +e
          for attempt in 1 2 3; do
            echo "── Attempt $attempt ──"
            if [ "$attempt" = "1" ]; then
              python build.py --version "$PACK_VERSION" --base-url "$BASE_URL"
            else
              python build.py --version "$PACK_VERSION" --base-url "$BASE_URL" \
                --skip-download --skip-pmtiles --skip-graph --skip-addresses 2>/dev/null
              # Rerun missing stages. build.py's --skip-* flags only skip
              # when the output already exists, so unfinished stages still run.
              python build.py --version "$PACK_VERSION" --base-url "$BASE_URL" \
                --skip-download
            fi
            rc=$?
            if [ $rc -eq 0 ]; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed (exit $rc); retrying in 30s…"
            sleep 30
          done
          echo "All attempts failed"
          exit 1

      - name: List outputs
        run: |
          ls -la "tools/build_turkey_pack/output/turkey-${PACK_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: turkey-pack-${{ env.PACK_VERSION }}
          name: "Turkey Offline Pack ${{ env.PACK_VERSION }}"
          body: |
            Automated build of the DriveLink Turkey offline pack.

            Artifacts:
              - `turkey.pmtiles` — Protomaps v4 vector tiles
              - `turkey.ghz`     — GraphHopper routing graph (car, CH)
              - `turkey_addresses.db` — SQLite FTS5 geocoding index
              - `manifest.json`  — SHA-256 hashes + asset URLs

            GraphHopper: ${{ env.GH_VERSION }}
            Built: ${{ github.run_started_at }}
          files: |
            tools/build_turkey_pack/output/turkey-${{ env.PACK_VERSION }}/turkey.pmtiles
            tools/build_turkey_pack/output/turkey-${{ env.PACK_VERSION }}/turkey.ghz
            tools/build_turkey_pack/output/turkey-${{ env.PACK_VERSION }}/turkey_addresses.db
            tools/build_turkey_pack/output/turkey-${{ env.PACK_VERSION }}/manifest.json
            tools/build_turkey_pack/output/turkey-${{ env.PACK_VERSION }}/SHA256SUMS.txt
